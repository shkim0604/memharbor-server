<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Agora Recorder</title>
  <script src="/vendor/AgoraRTC_N-production.js"></script>
</head>
<body>
  <div id="remote-players"></div>
  <script>
    // Parse URL params
    const params = new URLSearchParams(window.location.search);
    const APP_ID = params.get('appId');
    const CHANNEL = params.get('channel');
    const TOKEN = params.get('token') || null;
    const UID = parseInt(params.get('uid')) || 0;
    const SID = params.get('sid');

    // Globals
    let client = null;
    let mediaRecorder = null;
    let recordedChunks = [];
    let audioContext = null;
    let audioDestination = null;
    let connectedSources = new Map();
    let hadRemoteAudio = false;
    let autoStopTriggered = false;
    let autoStopTimer = null;
    let maxDurationTimer = null;
    let announcementTimers = [];
    let announcementTrack = null;
    const AUTO_STOP_DELAY_MS = 60 * 1000;
    const MAX_CALL_DURATION_MS = 40 * 60 * 1000;
    const ANNOUNCEMENTS = [
      { delay: 15 * 60 * 1000, file: '/announcements/15min.wav' },
      { delay: 30 * 60 * 1000, file: '/announcements/10min-left.wav' },
      { delay: 39 * 60 * 1000, file: '/announcements/1min-left.wav' },
    ];

    window.recorderReady = false;

    async function init() {
      try {
        console.log(`[${SID}] Initializing recorder for channel: ${CHANNEL}`);

        // Create client in audience mode (receive only)
        client = AgoraRTC.createClient({ mode: 'rtc', codec: 'vp8' });

        // Setup audio context for mixing
        audioContext = new AudioContext();
        audioDestination = audioContext.createMediaStreamDestination();

        // Event handlers
        client.on('user-published', async (user, mediaType) => {
          console.log(`[${SID}] User ${user.uid} published ${mediaType}`);
          
          await client.subscribe(user, mediaType);
          console.log(`[${SID}] Subscribed to user ${user.uid} ${mediaType}`);

          if (mediaType === 'audio') {
            // Get audio track and connect to mixer
            const audioTrack = user.audioTrack;
            if (audioTrack) {
              const mediaStream = new MediaStream([audioTrack.getMediaStreamTrack()]);
              const source = audioContext.createMediaStreamSource(mediaStream);
              source.connect(audioDestination);
              connectedSources.set(user.uid, source);
              hadRemoteAudio = true;
              cancelAutoStop('remote audio joined');
              console.log(`[${SID}] Connected audio from user ${user.uid}`);
              maybeAutoStop();
            }
          }
        });

        client.on('user-unpublished', (user, mediaType) => {
          console.log(`[${SID}] User ${user.uid} unpublished ${mediaType}`);
          
          if (mediaType === 'audio') {
            const source = connectedSources.get(user.uid);
            if (source) {
              source.disconnect();
              connectedSources.delete(user.uid);
              maybeAutoStop();
            }
          }
        });

        client.on('user-left', (user) => {
          console.log(`[${SID}] User ${user.uid} left`);
          const source = connectedSources.get(user.uid);
          if (source) {
            source.disconnect();
            connectedSources.delete(user.uid);
            maybeAutoStop();
          }
        });

        // Join channel
        const uid = await client.join(APP_ID, CHANNEL, TOKEN, UID);
        console.log(`[${SID}] Joined channel as UID: ${uid}`);

        // Start recording the mixed audio
        startMediaRecorder();

        for (const a of ANNOUNCEMENTS) {
          announcementTimers.push(setTimeout(() => {
            if (!autoStopTriggered) playAnnouncement(a.file);
          }, a.delay));
        }

        maxDurationTimer = setTimeout(() => {
          if (autoStopTriggered) return;
          autoStopTriggered = true;
          console.log(`[${SID}] Max call duration (${MAX_CALL_DURATION_MS / 60000}min) reached. Force stopping...`);
          fetch('/stop', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ sid: SID, reason: 'max_duration' })
          }).catch(err => {
            console.error(`[${SID}] Max duration stop failed:`, err);
          });
        }, MAX_CALL_DURATION_MS);

        window.recorderReady = true;
        console.log(`[${SID}] Recorder ready`);

      } catch (error) {
        console.error(`[${SID}] Init error:`, error);
        window.recorderReady = false;
      }
    }

    function startMediaRecorder() {
      const stream = audioDestination.stream;
      
      const options = {
        mimeType: 'audio/webm;codecs=opus',
        audioBitsPerSecond: 128000
      };

      mediaRecorder = new MediaRecorder(stream, options);
      
      mediaRecorder.ondataavailable = (event) => {
        if (event.data.size > 0) {
          recordedChunks.push(event.data);
        }
      };

      mediaRecorder.start(1000); // Collect data every 1 second
      console.log(`[${SID}] MediaRecorder started`);
    }

    function maybeAutoStop() {
      if (!hadRemoteAudio) return;
      if (autoStopTriggered) return;
      if (connectedSources.size > 0) {
        cancelAutoStop('remote audio present');
        return;
      }
      if (autoStopTimer) return;

      console.log(`[${SID}] No remote users remaining. Auto-stopping in ${AUTO_STOP_DELAY_MS / 1000}s...`);
      autoStopTimer = setTimeout(() => {
        if (autoStopTriggered) return;
        if (connectedSources.size > 0) {
          cancelAutoStop('remote audio rejoined before timeout');
          return;
        }
        autoStopTriggered = true;
        console.log(`[${SID}] Auto-stop timeout reached. Stopping...`);
        fetch('/stop', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ sid: SID })
        }).catch(err => {
          console.error(`[${SID}] Auto-stop failed:`, err);
        });
      }, AUTO_STOP_DELAY_MS);
    }

    async function playAnnouncement(audioUrl) {
      try {
        console.log(`[${SID}] Playing announcement: ${audioUrl}`);
        const response = await fetch(audioUrl);
        const arrayBuffer = await response.arrayBuffer();
        const audioBuffer = await audioContext.decodeAudioData(arrayBuffer);

        const source = audioContext.createBufferSource();
        source.buffer = audioBuffer;

        // Route to Agora channel only (not recorded)
        const announceDest = audioContext.createMediaStreamDestination();
        source.connect(announceDest);

        announcementTrack = AgoraRTC.createCustomAudioTrack({
          mediaStreamTrack: announceDest.stream.getAudioTracks()[0],
        });
        await client.publish(announcementTrack);
        source.start();

        source.onended = async () => {
          try {
            if (announcementTrack) {
              await client.unpublish(announcementTrack);
              announcementTrack.close();
              announcementTrack = null;
            }
            console.log(`[${SID}] Announcement finished`);
          } catch (e) {
            console.error(`[${SID}] Announcement cleanup error:`, e);
          }
        };
      } catch (error) {
        console.error(`[${SID}] Failed to play announcement:`, error);
      }
    }

    function cancelAutoStop(reason) {
      if (!autoStopTimer) return;
      clearTimeout(autoStopTimer);
      autoStopTimer = null;
      console.log(`[${SID}] Auto-stop cancelled: ${reason}`);
    }

    window.stopRecording = async function() {
      announcementTimers.forEach(t => clearTimeout(t));
      announcementTimers = [];
      if (maxDurationTimer) {
        clearTimeout(maxDurationTimer);
        maxDurationTimer = null;
      }
      if (announcementTrack) {
        try { await client.unpublish(announcementTrack); } catch (_) {}
        announcementTrack.close();
        announcementTrack = null;
      }
      return new Promise((resolve) => {
        if (!mediaRecorder || mediaRecorder.state === 'inactive') {
          resolve(null);
          return;
        }

        mediaRecorder.onstop = async () => {
          console.log(`[${SID}] MediaRecorder stopped, processing...`);
          
          // Leave channel
          if (client) {
            await client.leave();
            console.log(`[${SID}] Left channel`);
          }

          // Close audio context
          if (audioContext) {
            await audioContext.close();
          }

          // Convert to base64
          const blob = new Blob(recordedChunks, { type: 'audio/webm' });
          const reader = new FileReader();
          reader.onloadend = () => {
            const base64 = reader.result.split(',')[1];
            resolve(base64);
          };
          reader.readAsDataURL(blob);
        };

        mediaRecorder.stop();
      });
    };

    // Start
    init();
  </script>
</body>
</html>
